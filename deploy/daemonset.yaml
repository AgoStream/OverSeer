---
apiVersion: v1
kind: Namespace
metadata:
  name: overseer-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: overseer-agent
  namespace: overseer-system
  labels:
    app: overseer-agent
spec:
  selector:
    matchLabels:
      app: overseer-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: overseer-agent
    spec:
      serviceAccountName: overseer-agent
      hostPID: false
      tolerations:
        # Run on every node including control-plane nodes.
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      containers:
        - name: agent
          image: ghcr.io/overseer/agent:latest
          imagePullPolicy: Always
          args:
            - --source=perf
            - --uarch=sapphire_rapids
            - --interval=1s
            - --addr=:9100
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - name: state
              containerPort: 9100
              protocol: TCP
          securityContext:
            # CAP_PERFMON (Linux ≥5.8) enables perf_event_open without CAP_SYS_ADMIN.
            capabilities:
              add: ["CAP_PERFMON"]
            readOnlyRootFilesystem: true
            runAsNonRoot: false   # perf_event_open requires uid 0 on older kernels
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /state
              port: 9100
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /state
              port: 9100
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 2
          volumeMounts:
            - name: sys
              mountPath: /sys
              readOnly: true
      volumes:
        - name: sys
          hostPath:
            path: /sys
            type: Directory
